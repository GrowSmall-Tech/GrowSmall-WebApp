      <stop offset="0%" stop-color="#387ED1"/>
      <stop offset="55%" stop-color="#1f4f8b"/>
      <stop offset="100%" stop-color="#0f1d35"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
